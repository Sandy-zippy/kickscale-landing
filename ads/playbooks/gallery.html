<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>ZippyScale Playbooks Ads Gallery (27-34)</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0A0A0D; color: #FAFAFA; font-family: 'Inter', sans-serif; }

/* Toolbar */
.toolbar {
  position: sticky; top: 0; z-index: 100;
  background: #141418; border-bottom: 1px solid #2E2E36;
  padding: 16px 32px; display: flex; align-items: center; gap: 24px;
}
.toolbar h1 { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; color: #D5EB4B; }
.toolbar .sep { width: 1px; height: 28px; background: #2E2E36; }
.toggle-group { display: flex; border: 1px solid #2E2E36; border-radius: 8px; overflow: hidden; }
.toggle-btn {
  padding: 8px 20px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
  background: transparent; color: #9CA3AF; border: none; cursor: pointer; transition: all .2s;
}
.toggle-btn.active { background: #D5EB4B; color: #141418; }

/* Grid */
.grid { padding: 32px; display: grid; gap: 32px; }
.grid.feed { grid-template-columns: repeat(2, 1080px); justify-content: center; }
.grid.story { grid-template-columns: repeat(3, 1080px); justify-content: center; }
.grid-item { position: relative; cursor: pointer; transition: transform .2s; }
.grid-item:hover { transform: translateY(-4px); }

/* Fullscreen overlay */
.overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.92); justify-content: center; align-items: center;
  cursor: zoom-out; overflow: auto; padding: 20px;
}
.overlay.show { display: flex; }
.overlay .creative-wrap { flex-shrink: 0; }

/* Creative base */
.creative {
  position: relative; overflow: hidden;
  font-family: 'Inter', sans-serif; color: #FAFAFA;
}
.creative.feed { width: 1080px; height: 1080px; }
.creative.story { width: 1080px; height: 1920px; }

/* Ad number badge */
.ad-badge {
  position: absolute; bottom: 290px; left: 24px; z-index: 10;
  font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700;
  color: #6B7280; background: rgba(20,20,24,.7); padding: 4px 10px; border-radius: 6px;
  border: 1px solid #2E2E36;
}
.story .ad-badge { bottom: 410px; }

/* Logo */
.logo { position: absolute; top: 160px; left: 60px; z-index: 10; height: 40px; }

/* CTA bar */
.cta-bar {

  background: #D5EB4B; padding: 28px 60px;
  display: flex; align-items: center; justify-content: space-between;
}
.cta-bar .cta-text {
  font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 28px; color: #141418;
}
.cta-bar .cta-btn {
  font-family: 'Inter', sans-serif; font-weight: 600; font-size: 18px;
  color: #D5EB4B; background: #141418; padding: 14px 36px; border-radius: 8px;
}
.story .cta-bar { bottom: 400px; padding: 36px 80px; }
.story .cta-bar .cta-text { font-size: 32px; }

.ad33 .bg {

  background:

const makers = [makeAd27, makeAd28, makeAd29, makeAd30, makeAd31, makeAd32, makeAd33, makeAd34];

function render(mode) {
  const grid = document.getElementById('grid');
  grid.className = `grid ${mode}`;
  grid.innerHTML = makers.map(fn => `<div class="grid-item">${fn(mode)}</div>`).join('');

  grid.querySelectorAll('.grid-item').forEach(item => {
    item.addEventListener('click', () => {
      const overlay = document.getElementById('overlay');
      const content = document.getElementById('overlayContent');
      content.innerHTML = item.innerHTML;
      overlay.classList.add('show');
    });
  });
}

// Toggle
document.querySelectorAll('.toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.mode);
  });
});

// Overlay close
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('show');
  }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('overlay').classList.remove('show');
});

// Init
render('feed');
