<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZippyScale Automation Ads Gallery (35-40)</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0A0A0D; color: #FAFAFA; font-family: 'Inter', sans-serif; }

/* Toolbar */
.toolbar {
  position: sticky; top: 0; z-index: 100;
  background: #141418; border-bottom: 1px solid #2E2E36;
  padding: 16px 32px; display: flex; align-items: center; gap: 24px;
}
.toolbar h1 { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; color: #D5EB4B; }
.toolbar .sep { width: 1px; height: 28px; background: #2E2E36; }
.toggle-group { display: flex; border: 1px solid #2E2E36; border-radius: 8px; overflow: hidden; }
.toggle-btn {
  padding: 8px 20px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
  background: transparent; color: #9CA3AF; border: none; cursor: pointer; transition: all .2s;
}
.toggle-btn.active { background: #D5EB4B; color: #141418; }

/* Grid */
.grid { padding: 32px; display: grid; gap: 32px; }
.grid.feed { grid-template-columns: repeat(2, 1080px); justify-content: center; }
.grid.story { grid-template-columns: repeat(3, 1080px); justify-content: center; }
.grid-item { position: relative; cursor: pointer; transition: transform .2s; }
.grid-item:hover { transform: translateY(-4px); }

/* Fullscreen overlay */
.overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.92); justify-content: center; align-items: center;
  cursor: zoom-out; overflow: auto; padding: 20px;
}
.overlay.show { display: flex; }
.overlay .creative-wrap { flex-shrink: 0; }

/* Creative base */
.creative {
  position: relative; overflow: hidden;
  font-family: 'Inter', sans-serif; color: #FAFAFA;
}
.creative.feed { width: 1080px; height: 1080px; }
.creative.story { width: 1080px; height: 1920px; }

/* Badge */
.ad-badge {
  position: absolute; bottom: 290px; left: 24px; z-index: 10;
  font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700;
  color: #6B7280; background: rgba(20,20,24,.7); padding: 4px 10px; border-radius: 6px;
  border: 1px solid #2E2E36;
}
.story .ad-badge { bottom: 410px; }
.logo { position: absolute; top: 160px; left: 60px; z-index: 10; height: 40px; }
.story .logo { top: 260px; left: 80px; }

/* CTA bar */
.cta-bar {
  position: absolute; bottom: 280px; left: 0; right: 0;
  background: #D5EB4B; padding: 28px 60px;
  display: flex; align-items: center; justify-content: space-between;
}
.cta-bar .cta-text {
  font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 28px; color: #141418;
}
.cta-bar .cta-btn {
  font-family: 'Inter', sans-serif; font-weight: 600; font-size: 18px;
  color: #D5EB4B; background: #141418; padding: 14px 36px; border-radius: 8px;
}
.story .cta-bar { bottom: 400px; padding: 36px 80px; }
.story .cta-bar .cta-text { font-size: 32px; }

/* Circuit pattern shared */
.circuit-pattern {
  position: absolute; inset: 0; overflow: hidden;
}
.circuit-pattern::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(90deg, rgba(213,235,75,.04) 1px, transparent 1px),
    linear-gradient(0deg, rgba(213,235,75,.04) 1px, transparent 1px);
  background-size: 60px 60px;
}
.circuit-pattern::after {
  content: '';
  position: absolute;
  width: 8px; height: 8px; border-radius: 50%; background: rgba(213,235,75,.15);
  top: 180px; left: 240px;
  box-shadow:
    60px 0 0 rgba(213,235,75,.1),
    120px -60px 0 rgba(213,235,75,.12),
    180px 0 0 rgba(213,235,75,.08),
    240px 60px 0 rgba(213,235,75,.1),
    300px 0 0 rgba(213,235,75,.06),
    360px -60px 0 rgba(213,235,75,.12),
    420px 0 0 rgba(213,235,75,.08),
    480px 60px 0 rgba(213,235,75,.1),
    540px 0 0 rgba(213,235,75,.15),
    600px -60px 0 rgba(213,235,75,.06),
    0 120px 0 rgba(213,235,75,.1),
    60px 120px 0 rgba(213,235,75,.08),
    120px 180px 0 rgba(213,235,75,.12),
    180px 120px 0 rgba(213,235,75,.06),
    240px 180px 0 rgba(213,235,75,.1),
    300px 120px 0 rgba(213,235,75,.15),
    360px 180px 0 rgba(213,235,75,.08),
    420px 120px 0 rgba(213,235,75,.1),
    480px 180px 0 rgba(213,235,75,.12),
    540px 120px 0 rgba(213,235,75,.06);
}

/* Node connection line */
.node-line {
  position: absolute; height: 2px; background: linear-gradient(90deg, transparent, rgba(213,235,75,.15), transparent);
}
.node-dot {
  position: absolute; width: 10px; height: 10px; border-radius: 50%;
  background: #D5EB4B; opacity: .2;
}

/* ===== AD 35: Before/After Split ===== */
.ad35 { background: #141418; }
.ad35 .split {
  position: absolute; inset: 0; display: grid; grid-template-columns: 1fr 1fr;
}
.ad35.story .split { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
.ad35 .split-left {
  background: linear-gradient(135deg, #1a1418 0%, #1E1E24 100%);
  border-right: 3px solid #2E2E36;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 160px 60px 380px; text-align: center; position: relative;
}
.ad35.story .split-left { border-right: none; border-bottom: 3px solid #2E2E36; }
.ad35 .split-left::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(239,68,68,.05) 0%, transparent 60%);
}
.ad35 .split-right {
  background: linear-gradient(135deg, #141418 0%, #161a14 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 160px 60px 380px; text-align: center; position: relative;
}
.ad35 .split-right::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(213,235,75,.04) 0%, transparent 60%);
}
.ad35 .split-label {
  font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase; margin-bottom: 28px;
}
.ad35 .split-left .split-label { color: #EF4444; }
.ad35 .split-right .split-label { color: #D5EB4B; }
.ad35 .split-stat {
  font-family: 'JetBrains Mono', monospace; font-size: 100px; font-weight: 700; line-height: 1;
}
.ad35 .split-left .split-stat { color: #EF4444; }
.ad35 .split-right .split-stat { color: #D5EB4B; }
.ad35 .split-unit {
  font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 600;
  margin-top: 8px;
}
.ad35 .split-left .split-unit { color: #9CA3AF; }
.ad35 .split-right .split-unit { color: #FAFAFA; }
.ad35 .split-tasks {
  margin-top: 28px; font-size: 18px; line-height: 1.6; color: #9CA3AF; text-align: left;
}
.ad35 .split-tasks .task-item { display: flex; align-items: center; gap: 10px; }
.ad35 .split-left .task-x { color: #EF4444; font-weight: 700; }
.ad35 .split-right .task-check { color: #D5EB4B; font-weight: 700; }

/* ===== AD 36: Curiosity Question Hook ===== */
.ad36 { background: #141418; }
.ad36 .flow-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 30% 40%, rgba(213,235,75,.06) 0%, transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(213,235,75,.04) 0%, transparent 30%);
}
.ad36 .content {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  padding: 160px 80px 380px;
}
.ad36.story .content { padding: 310px 80px 500px; }
.ad36 .what-if {
  font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 600;
  color: #D5EB4B; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px;
}
.ad36 .headline {
  font-family: 'Space Grotesk', sans-serif; font-size: 52px; font-weight: 700;
  color: #FAFAFA; line-height: 1.15; max-width: 800px;
}
.ad36.story .headline { font-size: 60px; }
.ad36 .headline span { color: #D5EB4B; }
.ad36 .flow-items {
  margin-top: 48px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
  justify-content: center;
}
.ad36 .flow-node {
  background: #1E1E24; border: 1px solid #2E2E36; border-radius: 12px;
  padding: 16px 24px; font-size: 16px; font-weight: 500; color: #FAFAFA;
  position: relative;
}
.ad36 .flow-node.active { border-color: #D5EB4B; color: #D5EB4B; }
.ad36 .flow-arrow { color: #D5EB4B; font-size: 24px; font-weight: 700; }
.ad36 .sub {
  margin-top: 40px; font-size: 22px; color: #9CA3AF; max-width: 700px; line-height: 1.5;
}
.ad36 .price-tag {
  margin-top: 20px; font-family: 'JetBrains Mono', monospace; font-size: 24px;
  font-weight: 700; color: #D5EB4B;
}

/* ===== AD 37: ROI Cost Comparison ===== */
.ad37 { background: #141418; }
.ad37 .content {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  padding: 210px 70px 380px;
}
.ad37.story .content { padding: 310px 80px 500px; }
.ad37 .top-label {
  font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase; color: #D5EB4B; margin-bottom: 24px;
}
.ad37 .headline {
  font-family: 'Space Grotesk', sans-serif; font-size: 52px; font-weight: 700;
  color: #FAFAFA; line-height: 1.1;
}
.ad37 .headline .red { color: #EF4444; text-decoration: line-through; text-decoration-thickness: 3px; }
.ad37 .headline .lime { color: #D5EB4B; }
.ad37.story .headline { font-size: 60px; }
.ad37 .comparison {
  margin-top: 48px; display: grid; grid-template-columns: 1fr 1fr; gap: 32px; flex: 1;
}
.ad37.story .comparison { grid-template-columns: 1fr; gap: 40px; }
.ad37 .col { padding: 32px; border-radius: 16px; }
.ad37 .col.manual {
  background: rgba(239,68,68,.06); border: 1px solid rgba(239,68,68,.2);
}
.ad37 .col.automated {
  background: rgba(213,235,75,.06); border: 1px solid rgba(213,235,75,.2);
}
.ad37 .col-title {
  font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 24px;
}
.ad37 .col.manual .col-title { color: #EF4444; }
.ad37 .col.automated .col-title { color: #D5EB4B; }
.ad37 .cost-line {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.05);
  font-size: 17px; color: #9CA3AF;
}
.ad37 .cost-amount {
  font-family: 'JetBrains Mono', monospace; font-weight: 700;
}
.ad37 .col.manual .cost-amount { color: #EF4444; }
.ad37 .col.automated .cost-amount { color: #D5EB4B; }
.ad37 .total-line {
  display: flex; justify-content: space-between; padding: 16px 0; margin-top: 8px;
  font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 22px;
}
.ad37 .col.manual .total-line { color: #EF4444; }
.ad37 .col.automated .total-line { color: #D5EB4B; }

/* ===== AD 38: Race Lanes ===== */
.ad38 { background: #141418; }
.ad38 .lanes {
  position: absolute; inset: 0; display: grid; grid-template-rows: 1fr 1fr;
}
.ad38.story .lanes { padding-top: 260px; padding-bottom: 500px; }
.ad38 .lane {
  display: flex; align-items: center; padding: 0 80px; position: relative; overflow: hidden;
}
.ad38 .lane-top {
  background: linear-gradient(90deg, rgba(213,235,75,.04) 0%, rgba(213,235,75,.08) 100%);
  border-bottom: 2px solid #2E2E36;
}
.ad38 .lane-bottom {
  background: linear-gradient(90deg, rgba(239,68,68,.02) 0%, rgba(239,68,68,.05) 100%);
}
.ad38 .lane-label {
  font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase; writing-mode: vertical-lr;
  transform: rotate(180deg); margin-right: 32px;
}
.ad38 .lane-top .lane-label { color: #D5EB4B; }
.ad38 .lane-bottom .lane-label { color: #EF4444; }
.ad38 .lane-content { flex: 1; }
.ad38 .lane-headline {
  font-family: 'Space Grotesk', sans-serif; font-size: 40px; font-weight: 700;
  line-height: 1.15;
}
.ad38 .lane-top .lane-headline { color: #D5EB4B; }
.ad38 .lane-bottom .lane-headline { color: #FAFAFA; }
.ad38 .lane-items {
  margin-top: 16px; display: flex; gap: 12px; flex-wrap: wrap;
}
.ad38 .lane-chip {
  padding: 8px 16px; border-radius: 8px; font-size: 15px; font-weight: 500;
}
.ad38 .lane-top .lane-chip {
  background: rgba(213,235,75,.1); color: #D5EB4B; border: 1px solid rgba(213,235,75,.2);
}
.ad38 .lane-bottom .lane-chip {
  background: rgba(239,68,68,.08); color: #EF4444; border: 1px solid rgba(239,68,68,.15);
}
.ad38 .lane-speed {
  position: absolute; right: 80px; top: 50%; transform: translateY(-50%);
  font-family: 'JetBrains Mono', monospace; font-size: 60px; font-weight: 700;
}
.ad38 .lane-top .lane-speed { color: rgba(213,235,75,.15); }
.ad38 .lane-bottom .lane-speed { color: rgba(239,68,68,.1); }
.ad38 .center-text {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700;
  color: #FAFAFA; background: #141418; padding: 8px 24px; border-radius: 8px;
  border: 1px solid #2E2E36; z-index: 5; white-space: nowrap;
}

/* ===== AD 39: Task Checklist ===== */
.ad39 { background: #141418; }
.ad39 .content {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  padding: 210px 80px 380px;
}
.ad39.story .content { padding: 310px 80px 500px; }
.ad39 .watermark {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-family: 'JetBrains Mono', monospace; font-size: 300px; font-weight: 700;
  color: rgba(213,235,75,.04); line-height: 1;
}
.ad39.story .watermark { font-size: 360px; }
.ad39 .headline {
  font-family: 'Space Grotesk', sans-serif; font-size: 48px; font-weight: 700;
  color: #FAFAFA; line-height: 1.1; position: relative; z-index: 2;
}
.ad39 .headline span { color: #D5EB4B; }
.ad39.story .headline { font-size: 56px; }
.ad39 .task-grid {
  margin-top: 40px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
  position: relative; z-index: 2;
}
.ad39.story .task-grid { grid-template-columns: repeat(5, 1fr); gap: 10px; }
.ad39 .task-cell {
  height: 56px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700;
}
.ad39 .task-cell.auto {
  background: rgba(213,235,75,.1); border: 1px solid rgba(213,235,75,.2); color: #D5EB4B;
}
.ad39 .task-cell.manual {
  background: rgba(255,255,255,.03); border: 1px solid #2E2E36; color: #FAFAFA;
}
.ad39 .legend {
  margin-top: 24px; display: flex; gap: 32px; position: relative; z-index: 2;
}
.ad39 .legend-item { display: flex; align-items: center; gap: 8px; font-size: 16px; color: #9CA3AF; }
.ad39 .legend-dot {
  width: 12px; height: 12px; border-radius: 3px;
}
.ad39 .legend-dot.auto-dot { background: #D5EB4B; }
.ad39 .legend-dot.manual-dot { background: #FAFAFA; }
.ad39 .result {
  margin-top: auto; position: relative; z-index: 2;
  font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 600; color: #9CA3AF;
}
.ad39 .result span { color: #D5EB4B; font-weight: 700; }

/* ===== AD 40: Bold Statement / Podium ===== */
.ad40 { background: #141418; }
.ad40 .bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 50% 60%, rgba(213,235,75,.06) 0%, transparent 50%);
}
.ad40 .content {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  padding: 160px 80px 380px;
}
.ad40.story .content { padding: 310px 80px 500px; }
.ad40 .top-label {
  font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase; color: #9CA3AF; margin-bottom: 48px;
}
.ad40 .podium {
  display: flex; align-items: flex-end; gap: 12px; margin-bottom: 48px;
}
.ad40 .podium-block {
  width: 120px; border-radius: 8px 8px 0 0; display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start; padding-top: 20px;
}
.ad40 .podium-block.p2 { height: 140px; background: #1E1E24; border: 1px solid #2E2E36; }
.ad40 .podium-block.p1 { height: 200px; background: rgba(213,235,75,.12); border: 2px solid #D5EB4B; }
.ad40 .podium-block.p3 { height: 100px; background: #1E1E24; border: 1px solid #2E2E36; }
.ad40.story .podium-block { width: 160px; }
.ad40.story .podium-block.p2 { height: 180px; }
.ad40.story .podium-block.p1 { height: 260px; }
.ad40.story .podium-block.p3 { height: 130px; }
.ad40 .podium-rank {
  font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 700;
}
.ad40 .podium-block.p1 .podium-rank { color: #D5EB4B; }
.ad40 .podium-block.p2 .podium-rank, .ad40 .podium-block.p3 .podium-rank { color: #6B7280; }
.ad40 .podium-label {
  font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
  margin-top: 8px; letter-spacing: 1px; text-transform: uppercase;
}
.ad40 .podium-block.p1 .podium-label { color: #D5EB4B; }
.ad40 .podium-block.p2 .podium-label, .ad40 .podium-block.p3 .podium-label { color: #6B7280; }
.ad40 .headline {
  font-family: 'Space Grotesk', sans-serif; font-size: 48px; font-weight: 700;
  color: #FAFAFA; line-height: 1.15; max-width: 800px;
}
.ad40 .headline span { color: #D5EB4B; }
.ad40.story .headline { font-size: 56px; }
.ad40 .sub {
  font-size: 22px; color: #9CA3AF; margin-top: 16px; max-width: 700px; line-height: 1.4;
}
.ad40 .price {
  margin-top: 24px; font-family: 'JetBrains Mono', monospace; font-size: 28px;
  font-weight: 700; color: #D5EB4B;
}
</style>
</head>
<body>

<div class="toolbar">
  <h1>Automation Funnel</h1>
  <span class="sep"></span>
  <div class="toggle-group">
    <button class="toggle-btn active" data-mode="feed">Feed (1080x1080)</button>
    <button class="toggle-btn" data-mode="story">Story (1080x1920)</button>
  </div>
  <span class="sep"></span>
  <span style="color:#6B7280;font-size:13px;">Ads 35-40 | Click to fullscreen</span>
</div>

<div class="grid feed" id="grid"></div>

<div class="overlay" id="overlay">
  <div class="creative-wrap" id="overlayContent"></div>
</div>

<script>
const logoSrc = '../../brand-assets/zippyscale-logo-for-dark-bg.png';

function makeAd35(mode) {
  return `
  <div class="creative ad35 ${mode}">
    <div class="circuit-pattern"></div>
    <span class="ad-badge">#35</span>
    <img class="logo" src="${logoSrc}" alt="ZippyScale">
    <div class="split">
      <div class="split-left">
        <div class="split-label">Manual</div>
        <div class="split-stat">40</div>
        <div class="split-unit">hours/week</div>
        <div class="split-tasks">
          <div class="task-item"><span class="task-x">&#10007;</span> Manual data entry</div>
          <div class="task-item"><span class="task-x">&#10007;</span> Copy-pasting leads</div>
          <div class="task-item"><span class="task-x">&#10007;</span> Building reports</div>
          <div class="task-item"><span class="task-x">&#10007;</span> Manual follow-ups</div>
        </div>
      </div>
      <div class="split-right">
        <div class="split-label">AI Automated</div>
        <div class="split-stat">4</div>
        <div class="split-unit">hours/week</div>
        <div class="split-tasks">
          <div class="task-item"><span class="task-check">&#10003;</span> Auto CRM sync</div>
          <div class="task-item"><span class="task-check">&#10003;</span> Instant lead routing</div>
          <div class="task-item"><span class="task-check">&#10003;</span> Live dashboards</div>
          <div class="task-item"><span class="task-check">&#10003;</span> AI follow-ups</div>
        </div>
      </div>
    </div>
    <div class="cta-bar">
      <span class="cta-text">40 Hours to 4. AI.</span>
      <span class="cta-btn">Learn More</span>
    </div>
  </div>`;
}

function makeAd36(mode) {
  return `
  <div class="creative ad36 ${mode}">
    <div class="circuit-pattern"></div>
    <div class="flow-bg"></div>
    <span class="ad-badge">#36</span>
    <img class="logo" src="${logoSrc}" alt="ZippyScale">
    <div class="content">
      <div class="what-if">What If</div>
      <div class="headline">Your ops ran on <span>autopilot</span><br>while you scaled?</div>
      <div class="flow-items">
        <div class="flow-node active">Lead In</div>
        <span class="flow-arrow">&rarr;</span>
        <div class="flow-node">Auto Score</div>

const makers = [makeAd35, makeAd36, makeAd37, makeAd38, makeAd39, makeAd40];

function render(mode) {
  const grid = document.getElementById('grid');
  grid.className = `grid ${mode}`;
  grid.innerHTML = makers.map(fn => `<div class="grid-item">${fn(mode)}</div>`).join('');

  grid.querySelectorAll('.grid-item').forEach(item => {
    item.addEventListener('click', () => {
      const overlay = document.getElementById('overlay');
      const content = document.getElementById('overlayContent');
      content.innerHTML = item.innerHTML;
      overlay.classList.add('show');
    });
  });
}

document.querySelectorAll('.toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.mode);
  });
});

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('show');
  }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('overlay').classList.remove('show');
});

render('feed');
