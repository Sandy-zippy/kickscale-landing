<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="margin:0;padding:0;background: #2A2A35;">
<div style="width:1080px;height:1080px;background:#2A2A35;position:relative;overflow:hidden;font-family:'Inter',sans-serif;">

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-for-dark-bg.png" style="position:absolute;top:170px;left:70px;height:32px;z-index:10;">

  <!-- Headline -->
  <div style="position:absolute;top:230px;left:70px;right:70px;z-index:10;">
    <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:44px;color:#FFFFFF;line-height:1.2;">
      7 of 10 spots are taken.
    </h1>
  </div>

  <!-- Giant number -->
  <div style="position:absolute;top:320px;left:70px;z-index:10;">
    <span style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:280px;color:#D5EB4B;line-height:1;opacity:0.95;">3</span>
  </div>

  <!-- "spots left" label -->
  <div style="position:absolute;top:530px;left:360px;z-index:10;">
    <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:36px;color:rgba(255,255,255,0.6);">spots left</span>
  </div>

  <!-- Body -->
  <div style="position:absolute;top:620px;left:70px;right:70px;z-index:10;">
    <p style="font-size:22px;color:rgba(255,255,255,0.65);line-height:1.6;">
      Free AI Automation Audit. We manually review your business and deliver a custom roadmap. Only 3 spots left this quarter.
    </p>
  </div>

  <!-- CTA -->
  <div style="position:absolute;top:770px;left:70px;z-index:10;">
    <div style="display:inline-block;background:#D5EB4B;border-radius:12px;padding:20px 48px;">
      <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:#2A2A35;">Claim Your Spot →</span>
    </div>
  </div>

  <!-- Subtle glow behind number -->
  <div style="position:absolute;top:300px;left:0;width:400px;height:400px;background:radial-gradient(circle,rgba(213,235,75,0.08),transparent 60%);z-index:5;"></div>

</div>
</body>
</html>
