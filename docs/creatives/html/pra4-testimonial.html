<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="margin:0;padding:0;background: #FFFDF7;">
<div style="width:1080px;height:1080px;background:#FFFDF7;position:relative;overflow:hidden;font-family:'Inter',sans-serif;">

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-transparent.png" style="position:absolute;top:170px;left:70px;width:140px;height:auto;z-index:10;">

  <!-- Giant quote mark -->
  <div style="position:absolute;top:210px;left:60px;z-index:5;">
    <span style="font-family:'Space Grotesk',sans-serif;font-size:200px;color:rgba(213,235,75,0.2);line-height:1;font-weight:700;">"</span>
  </div>

  <!-- Quote -->
  <div style="position:absolute;top:310px;left:70px;right:70px;z-index:10;">
    <p style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:38px;color:#2A2A35;line-height:1.35;">
      We were spending ₹18L/year on work that now runs automatically. ZippyScale found it in their audit.
    </p>
  </div>

  <!-- Attribution -->
  <div style="position:absolute;top:580px;left:70px;right:70px;z-index:10;">
    <div style="width:60px;height:3px;background:#D5EB4B;margin-bottom:16px;"></div>
    <p style="font-size:20px;color:rgba(42,42,53,0.6);line-height:1.5;">
      Manufacturing Company, Pune<br>
      <span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:#2A2A35;">₹8Cr revenue</span>
    </p>
  </div>

  <!-- Projected note -->
  <div style="position:absolute;top:690px;left:70px;z-index:10;">
    <span style="font-size:13px;color:rgba(42,42,53,0.35);font-style:italic;">*Projected results based on audit findings</span>
  </div>

  <!-- CTA -->
  <div style="position:absolute;top:770px;left:70px;z-index:10;">
    <div style="display:inline-block;background: #D5EB4B; border-radius: 12px; padding: 20px 48px;">
      <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:#1A1A2E;">Get Your Free Audit →</span>
    </div>
  </div>

</div>
</body>
</html>
