<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="background: #2A2A35; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div style="width: 1080px; height: 1080px; background: #2A2A35; position: relative; overflow: hidden;">

  <!-- Geometric accents -->
  <div style="position: absolute; top: -80px; right: -80px; width: 300px; height: 300px; border: 2px solid rgba(213,235,75,0.08); border-radius: 50%;"></div>
  <div style="position: absolute; top: -40px; right: -40px; width: 220px; height: 220px; border: 2px solid rgba(213,235,75,0.05); border-radius: 50%;"></div>
  <div style="position: absolute; bottom: 320px; left: -60px; width: 160px; height: 160px; border: 2px solid rgba(213,235,75,0.06); transform: rotate(45deg);"></div>
  <div style="position: absolute; top: 400px; right: 40px; width: 6px; height: 6px; background: #D5EB4B; border-radius: 50; opacity: 0.4;"></div>
  <div style="position: absolute; top: 500px; right: 100px; width: 4px; height: 4px; background: #D5EB4B; border-radius: 50%; opacity: 0.25;"></div>

  <!-- Lime accent bar -->
  <div style="position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: linear-gradient(180deg, #D5EB4B 0%, rgba(213,235,75,0.1) 100%);"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-for-dark-bg.png" style="position: absolute; top: 50px; left: 60px; width: 120px; height: auto;">

  <!-- Main headline -->
  <div style="position: absolute; top: 170px; left: 60px; right: 60px;">
    <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 52px; line-height: 1.15; color: #FFFFFF; letter-spacing: -1px;">
      Your ₹15L/month<br>salary bill has a<br><span style="color: #D5EB4B;">₹5L leak.</span>
    </h1>
  </div>

  <!-- Stat -->
  <div style="position: absolute; top: 460px; left: 60px;">
    <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 80px; color: #D5EB4B; line-height: 1;">₹40L+/yr</div>
    <div style="font-family: 'Inter', sans-serif; font-weight: 400; font-size: 18px; color: rgba(255,255,255,0.4); margin-top: 8px; letter-spacing: 2px; text-transform: uppercase;">wasted on busywork</div>
  </div>

  <!-- Body text -->
  <div style="position: absolute; top: 620px; left: 60px; right: 60px;">
    <p style="font-family: 'Inter', sans-serif; font-weight: 400; font-size: 26px; line-height: 1.5; color: rgba(255,255,255,0.75);">
      3 of your employees are doing work that AI finishes in 10 minutes. You're paying for busywork.
    </p>
  </div>

  <!-- CTA Button -->
  <div style="position: absolute; bottom: 260px; left: 60px;">
    <div style="display: inline-block; background: #D5EB4B; padding: 20px 48px; border-radius: 12px;">
      <span style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; color: #2A2A35;">Find Your Leak → Free Audit</span>
    </div>
  </div>

</div>
</body>
</html>
