<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="margin:0;padding:0;background: #2A2A35;">
<div style="width:1080px;height:1080px;background:#2A2A35;position:relative;overflow:hidden;font-family:'Inter',sans-serif;">

  <!-- Subtle pattern -->
  <div style="position:absolute;top:0;left:0;width:100%;height:100%;background-image:radial-gradient(circle,rgba(213,235,75,0.02) 1px,transparent 1px);background-size:40px 40px;"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-for-dark-bg.png" style="position:absolute;top:170px;left:70px;height:32px;z-index:10;">

  <!-- Headline -->
  <div style="position:absolute;top:230px;left:70px;right:70px;z-index:10;">
    <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:46px;color:#FFFFFF;line-height:1.15;">
      From Audit to Automation<br>in <span style="color:#D5EB4B;">14 Days</span>
    </h1>
  </div>

  <!-- 3 Steps -->
  <div style="position:absolute;top:380px;left:70px;right:70px;display:flex;gap:20px;z-index:10;">

    <!-- Step 1 -->
    <div style="flex:1;background:#33333F;border-radius:16px;padding:28px 24px;position:relative;">
      <div style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:48px;color:#D5EB4B;margin-bottom:12px;">1</div>
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;color:#FFFFFF;margin-bottom:8px;">Take Quiz</div>
      <div style="font-size:16px;color:rgba(255,255,255,0.5);">2 minutes</div>
      <!-- Arrow -->
      <div style="position:absolute;right:-16px;top:50%;transform:translateY(-50%);font-size:24px;color:#D5EB4B;z-index:5;">→</div>
    </div>

    <!-- Step 2 -->
    <div style="flex:1;background:#33333F;border-radius:16px;padding:28px 24px;position:relative;">
      <div style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:48px;color:#D5EB4B;margin-bottom:12px;">2</div>
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;color:#FFFFFF;margin-bottom:8px;">Get Audit</div>
      <div style="font-size:16px;color:rgba(255,255,255,0.5);">48 hours</div>
      <!-- Arrow -->
      <div style="position:absolute;right:-16px;top:50%;transform:translateY(-50%);font-size:24px;color:#D5EB4B;z-index:5;">→</div>
    </div>

    <!-- Step 3 -->
    <div style="flex:1;background:#33333F;border-radius:16px;padding:28px 24px;">
      <div style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:48px;color:#D5EB4B;margin-bottom:12px;">3</div>
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;color:#FFFFFF;margin-bottom:8px;">Go Live</div>
      <div style="font-size:16px;color:rgba(255,255,255,0.5);">2 weeks</div>
    </div>
  </div>

  <!-- Body -->
  <div style="position:absolute;top:610px;left:70px;right:70px;z-index:10;">
    <p style="font-size:22px;color:rgba(255,255,255,0.75);line-height:1.6;">
      We don't just consult. We build, deploy, and monitor.<br>
      <span style="color:#FFFFFF;font-weight:500;">Your team does 10x the work from day one.</span>
    </p>
  </div>

  <!-- CTA -->
  <div style="position:absolute;top:770px;left:70px;z-index:10;">
    <div style="display:inline-block;background:#D5EB4B;border-radius:12px;padding:20px 48px;">
      <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:#2A2A35;">Start With the Quiz →</span>
    </div>
  </div>

</div>
</body>
</html>
