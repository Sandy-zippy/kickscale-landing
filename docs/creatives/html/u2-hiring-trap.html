<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="background: #FFFDF7; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div style="width: 1080px; height: 1080px; background: #FFFDF7; position: relative; overflow: hidden;">

  <!-- Geometric accents -->
  <div style="position: absolute; bottom: 350px; right: -40px; width: 200px; height: 200px; border: 2px solid rgba(42,42,53,0.06); border-radius: 50%;"></div>
  <div style="position: absolute; top: 200px; left: -60px; width: 160px; height: 140px; border: 2px solid rgba(42,42,53,0.04); transform: rotate(45deg);"></div>
  <div style="position: absolute; top: 350px; right: 80px; width: 8px; height: 8px; background: #D5EB4B; border-radius: 50%;"></div>

  <!-- Accent bar -->
  <div style="position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: linear-gradient(180deg, #D5EB4B 0%, rgba(213,235,75,0.2) 100%);"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-transparent.png" style="position: absolute; top: 50px; left: 60px; width: 160px; height: auto;">

  <!-- Main headline -->
  <div style="position: absolute; top: 170px; left: 60px; right: 60px;">
    <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 50px; line-height: 1.15; color: #1A1A2E; letter-spacing: -1px;">
      You hired 5 people<br>last year. Output<br>didn't change.
    </h1>
  </div>

  <!-- Stat -->
  <div style="position: absolute; top: 460px; left: 60px;">
    <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 88px; color: #E53E3E; line-height: 1;">0%</div>
    <div style="font-family: 'Inter', sans-serif; font-weight: 500; font-size: 28px; color: #E53E3E; margin-top: 4px;">growth</div>
  </div>

  <!-- Body text -->
  <div style="position: absolute; top: 630px; left: 60px; right: 60px;">
    <p style="font-family: 'Inter', sans-serif; font-weight: 400; font-size: 26px; line-height: 1.5; color: rgba(42,42,53,0.7);">
      More people ≠ more output. Your team is stuck in Excel, WhatsApp, and manual follow-ups. The problem isn't people.
    </p>
  </div>

  <!-- CTA Button -->
  <div style="position: absolute; bottom: 260px; left: 60px;">
    <div style="display: inline-block; background: #D5EB4B; border-radius: 12px; padding: 20px 48px; border-radius: 8px;">
      <span style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; color: #1A1A2E;">See What's Really Wrong</span>
    </div>
  </div>

</div>
</body>
</html>
