<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="background: #2A2A35; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div style="width: 1080px; height: 1080px; background: #2A2A35; position: relative; overflow: hidden;">

  <!-- Geometric accents -->
  <div style="position: absolute; top: 200px; right: -50px; width: 200px; height: 200px; border: 2px solid rgba(213,235,75,0.07); border-radius: 50%;"></div>
  <div style="position: absolute; top: 250px; right: 0px; width: 140px; height: 140px; border: 2px solid rgba(213,235,75,0.04); border-radius: 50%;"></div>
  <div style="position: absolute; bottom: 400px; left: -30px; width: 100px; height: 100px; border: 2px solid rgba(213,235,75,0.05); transform: rotate(45deg);"></div>

  <!-- Accent bar -->
  <div style="position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: linear-gradient(180deg, #D5EB4B 0%, rgba(213,235,75,0.1) 100%);"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-for-dark-bg.png" style="position: absolute; top: 50px; left: 60px; width: 120px; height: auto;">

  <!-- Main headline -->
  <div style="position: absolute; top: 170px; left: 60px; right: 60px;">
    <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 52px; line-height: 1.15; color: #FFFFFF; letter-spacing: -1px;">
      Hiring more people<br>won't fix your<br>business.
    </h1>
  </div>

  <!-- Stat -->
  <div style="position: absolute; top: 460px; left: 60px;">
    <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 64px; color: #D5EB4B; line-height: 1;">10x output</div>
    <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 36px; color: rgba(213,235,75,0.6); line-height: 1; margin-top: 8px;">same team</div>
  </div>

  <!-- Body text -->
  <div style="position: absolute; top: 620px; left: 60px; right: 60px;">
    <p style="font-family: 'Inter', sans-serif; font-weight: 400; font-size: 26px; line-height: 1.5; color: rgba(255,255,255,0.75);">
      Your team is capable. They're just drowning in manual ops. The fix isn't more people. It's better systems.
    </p>
  </div>

  <!-- CTA Button -->
  <div style="position: absolute; bottom: 260px; left: 60px;">
    <div style="display: inline-block; background: #D5EB4B; padding: 20px 48px; border-radius: 12px;">
      <span style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; color: #2A2A35;">Get Your Free Audit</span>
    </div>
  </div>

</div>
</body>
</html>
