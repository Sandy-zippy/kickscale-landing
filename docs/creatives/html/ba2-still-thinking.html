<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="margin:0;padding:0;background: #FFFDF7;">
<div style="width:1080px;height:1080px;background:#FFFDF7;position:relative;overflow:hidden;font-family:'Inter',sans-serif;">

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-transparent.png" style="position:absolute;top:170px;left:70px;width:140px;height:auto;z-index:10;">

  <!-- Headline -->
  <div style="position:absolute;top:240px;left:70px;right:70px;z-index:10;">
    <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:46px;color: #1A1A2E;line-height:1.2;">
      Still thinking about it?<br><span style="color:#6B8A00;">Your competitors aren't.</span>
    </h1>
  </div>

  <!-- Cost highlight -->
  <div style="position:absolute;top:430px;left:70px;right:70px;z-index:10;">
    <div style="background:rgba(213,235,75,0.12);border-left:4px solid #D5EB4B;border-radius:0 12px 12px 0;padding:24px 30px;">
      <span style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:28px;color:#2A2A35;">
        Every week you wait = ₹75K to manual busywork
      </span>
    </div>
  </div>

  <!-- Body -->
  <div style="position:absolute;top:550px;left:70px;right:70px;z-index:10;">
    <p style="font-size:24px;color:rgba(42,42,53,0.7);line-height:1.6;">
      The audit is free.<br>
      The roadmap is custom.<br>
      <span style="color:#2A2A35;font-weight:600;">What's stopping you?</span>
    </p>
  </div>

  <!-- CTA -->
  <div style="position:absolute;top:770px;left:70px;z-index:10;">
    <div style="display:inline-block;background: #D5EB4B; border-radius: 12px; padding: 20px 48px;">
      <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:#1A1A2E;">Finish the Quiz →</span>
    </div>
  </div>

</div>
</body>
</html>
