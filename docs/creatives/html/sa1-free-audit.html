<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="margin:0;padding:0;background: #2A2A35;">
<div style="width:1080px;height:1080px;background:#2A2A35;position:relative;overflow:hidden;font-family:'Inter',sans-serif;">

  <!-- Subtle grid pattern -->
  <div style="position:absolute;top:0;left:0;width:100%;height:100%;background-image:radial-gradient(circle,rgba(213,235,75,0.03) 1px,transparent 1px);background-size:40px 40px;"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-for-dark-bg.png" style="position:absolute;top:170px;left:70px;height:36px;z-index:10;">

  <!-- Headline -->
  <div style="position:absolute;top:240px;left:70px;right:70px;z-index:10;">
    <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:52px;color:#FFFFFF;line-height:1.15;margin-bottom:32px;">
      Free AI Automation Audit<br>for ₹5Cr+ Businesses
    </h1>
  </div>

  <!-- Stat badge -->
  <div style="position:absolute;top:430px;left:70px;z-index:10;">
    <div style="display:inline-block;background: rgba(213,235,75,0.1); border: none; padding: 12px 24px; border-radius: 8px;">
      <span style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:42px;color:#D5EB4B;">Only 10 spots</span>
    </div>
  </div>

  <!-- Body text -->
  <div style="position:absolute;top:530px;left:70px;right:70px;z-index:10;">
    <p style="font-size:22px;color:rgba(255,255,255,0.8);line-height:1.6;font-weight:400;">
      We review your entire operations. Map every automation opportunity. Deliver a custom roadmap.<br><br>
      <span style="color:rgba(255,255,255,0.5);">Zero cost. Zero obligation. Only 10 businesses this quarter.</span>
    </p>
  </div>

  <!-- Checkmarks -->
  <div style="position:absolute;top:710px;left:70px;z-index:10;">
    <span style="font-size:18px;color:rgba(213,235,75,0.7);font-weight:500;letter-spacing:1px;">
      ✓ Free&nbsp;&nbsp;&nbsp;&nbsp;✓ Custom&nbsp;&nbsp;&nbsp;&nbsp;✓ 48hr delivery
    </span>
  </div>

  <!-- CTA -->
  <div style="position:absolute;top:790px;left:70px;z-index:10;">
    <div style="display:inline-block;background:#D5EB4B;border-radius:12px;padding:20px 48px;">
      <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:#2A2A35;">Claim Your Spot →</span>
    </div>
  </div>

  <!-- Decorative lime accent -->
  <div style="position:absolute;bottom:0;right:0;width:300px;height:300px;background:radial-gradient(circle at bottom right,rgba(213,235,75,0.08),transparent 70%);"></div>

</div>
</body>
</html>
