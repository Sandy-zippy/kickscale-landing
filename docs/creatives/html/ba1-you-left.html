<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="margin:0;padding:0;background: #2A2A35;">
<div style="width:1080px;height:1080px;background:#2A2A35;position:relative;overflow:hidden;font-family:'Inter',sans-serif;">

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-for-dark-bg.png" style="position:absolute;top:170px;left:70px;height:32px;z-index:10;">

  <!-- Headline -->
  <div style="position:absolute;top:240px;left:70px;right:70px;z-index:10;">
    <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:46px;color:#FFFFFF;line-height:1.2;">
      You visited.<br>You scrolled.<br><span style="color:rgba(255,255,255,0.4);">You didn't finish.</span>
    </h1>
  </div>

  <!-- Visit badge -->
  <div style="position:absolute;top:470px;left:70px;z-index:10;">
    <div style="display:inline-block;background:rgba(213,235,75,0.1);border:2px solid #D5EB4B;border-radius:12px;padding:14px 28px;">
      <span style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:32px;color:#D5EB4B;">Visit #2</span>
    </div>
  </div>

  <!-- Body -->
  <div style="position:absolute;top:560px;left:70px;right:70px;z-index:10;">
    <p style="font-size:22px;color:rgba(255,255,255,0.65);line-height:1.7;">
      The quiz takes <span style="color:#D5EB4B;font-weight:600;">2 minutes</span>.<br>
      The audit takes <span style="color:#D5EB4B;font-weight:600;">48 hours</span>.<br>
      The savings last <span style="color:#D5EB4B;font-weight:600;">forever</span>.<br><br>
      <span style="color:rgba(255,255,255,0.45);">Come back and finish.</span>
    </p>
  </div>

  <!-- CTA -->
  <div style="position:absolute;top:790px;left:70px;z-index:10;">
    <div style="display:inline-block;background:#D5EB4B;border-radius:12px;padding:20px 48px;">
      <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:#2A2A35;">Complete Your Audit →</span>
    </div>
  </div>

</div>
</body>
</html>
