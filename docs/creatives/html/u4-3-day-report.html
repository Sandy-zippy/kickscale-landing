<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="background: #FFFDF7; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div style="width: 1080px; height: 1080px; background: #FFFDF7; position: relative; overflow: hidden;">

  <!-- Geometric accents -->
  <div style="position: absolute; top: -60px; right: -60px; width: 260px; height: 260px; border: 2px solid rgba(42,42,53,0.05); border-radius: 50%;"></div>
  <div style="position: absolute; bottom: 380px; left: -40px; width: 120px; height: 120px; border: 2px solid rgba(42,42,53,0.04); transform: rotate(30deg);"></div>
  <div style="position: absolute; top: 500px; right: 60px; width: 6px; height: 6px; background: #B8CF2E; border-radius: 50%; opacity: 0.4;"></div>

  <!-- Accent bar -->
  <div style="position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: linear-gradient(180deg, #B8CF2E 0%, rgba(184,207,46,0.15) 100%);"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-transparent.png" style="position: absolute; top: 50px; left: 60px; width: 160px; height: auto;">

  <!-- Main headline -->
  <div style="position: absolute; top: 170px; left: 60px; right: 80px;">
    <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 46px; line-height: 1.15; color: #1A1A2E; letter-spacing: -1px;">
      By the time you see last week's numbers, the opportunity is gone.
    </h1>
  </div>

  <!-- Stat -->
  <div style="position: absolute; top: 460px; left: 60px;">
    <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 88px; color: #D97706; line-height: 1;">3-5</div>
    <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 40px; color: #D97706; line-height: 1; margin-top: 4px;">days</div>
    <div style="font-family: 'Inter', sans-serif; font-weight: 400; font-size: 18px; color: rgba(42,42,53,0.45); margin-top: 10px; letter-spacing: 2px; text-transform: uppercase;">to compile a report</div>
  </div>

  <!-- Body text -->
  <div style="position: absolute; top: 650px; left: 60px; right: 60px;">
    <p style="font-family: 'Inter', sans-serif; font-weight: 400; font-size: 26px; line-height: 1.5; color: rgba(42,42,53,0.7);">
      Your team spends 3 days compiling what AI generates in 30 seconds. Every day you wait costs you decisions.
    </p>
  </div>

  <!-- CTA Button -->
  <div style="position: absolute; bottom: 260px; left: 60px;">
    <div style="display: inline-block; background: #D5EB4B; border-radius: 12px; padding: 20px 48px; border-radius: 8px;">
      <span style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; color: #1A1A2E;">Get Real-Time Data</span>
    </div>
  </div>

</div>
</body>
</html>
